<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>03466.HK 股息率</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="./app.js" defer></script>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">HKEX 03466</p>
          <h1>03466.HK 年化 TTM 股息率</h1>
          <p class="subhead">按每日收盘价计算；TTM 不足 12 个月时，用最近单月股息补足到 12 个月。</p>
        </div>
        <div class="version">
          <span>v0.4.3</span>
          <span>2026-06-30 16:15 CST</span>
        </div>
      </header>

      <section class="metrics" aria-label="关键指标">
        <div class="metric">
          <span class="label">最新日期</span>
          <strong data-latest-field="trade_date">2026-06-30</strong>
        </div>
        <div class="metric">
          <span class="label">收盘价</span>
          <strong data-latest-field="close">18.26 HKD</strong>
        </div>
        <div class="metric">
          <span class="label">年化股息</span>
          <strong data-latest-field="annualized_dividend_hkd">1.48 HKD</strong>
        </div>
        <div class="metric highlight">
          <span class="label">年化股息率</span>
          <strong data-latest-field="annualized_dividend_yield_pct">8.11%</strong>
        </div>
      </section>

      <section class="chart-panel" aria-label="折线图">
        <div class="chart-wrap">
          <svg id="yieldChart" role="img" aria-label="03466.HK daily annualized TTM dividend yield and close price interactive line chart"></svg>
        </div>
        <div class="point-readout" id="pointReadout" aria-live="polite">
          <div>
            <span class="label">选中日期</span>
            <strong data-field="trade_date">-</strong>
          </div>
          <div>
            <span class="label">收盘价</span>
            <strong data-field="close">-</strong>
          </div>
          <div>
            <span class="label">年化股息</span>
            <strong data-field="annualized_dividend_hkd">-</strong>
          </div>
          <div>
            <span class="label">股息率</span>
            <strong data-field="annualized_dividend_yield_pct">-</strong>
          </div>
        </div>
        <noscript>
          <img src="./assets/03466_ttm_dividend_yield_daily_annualized.png" alt="03466.HK daily annualized TTM dividend yield line chart">
        </noscript>
      </section>

      <section class="details">
        <div class="details-wide">
          <h2>计算口径</h2>
          <p>对每个交易日，取截至该日已除息的最近最多 12 次月度分派；如果不足 12 次，则用最近一次月度分派补足剩余月份，再除以当日收盘价。</p>
        </div>
      </section>

      <nav class="downloads" aria-label="下载">
        <a id="dailyCsvLink" href="./assets/03466_ttm_dividend_yield_daily_annualized.csv">下载逐日计算 CSV</a>
        <a id="dividendCsvLink" href="./assets/03466_dividends_source_hsi.csv">下载派息源数据 CSV</a>
      </nav>
    </main>
  </body>
</html>
